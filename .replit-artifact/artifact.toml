kind = "mobile"
previewPath = "/mobile/"
title = "AA Mods Mobile"
version = "1.0.0"
id = "artifacts/aa-mods-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22650

[services.development]
run = "pnpm --filter @workspace/aa-mods-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aa-mods-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aa-mods-mobile", "run", "serve" ]

[services.env]
PORT = "22650"
BASE_PATH = "/mobile/"
